---
# Base Stash policy. Official File operations inject proxies before the script builds groups.
mode: rule
log-level: warning
dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver-policy:
    "+.internal": system
    "+.intranet": system
    "+.corp": system
    "+.private": system
  follow-rule: false
proxies: []
proxy-groups: []
rule-providers:
  ai:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/cccccoke/sub-store/main/rules/ai.yaml
    path: "./rules/ai.yaml"
    interval: 3600
  developer:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/cccccoke/sub-store/main/rules/developer.yaml
    path: "./rules/developer.yaml"
    interval: 3600
  developer-download:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/cccccoke/sub-store/main/rules/developer-download.yaml
    path: "./rules/developer-download.yaml"
    interval: 3600
  research:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/cccccoke/sub-store/main/rules/research.yaml
    path: "./rules/research.yaml"
    interval: 3600
  proxy:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/cccccoke/sub-store/main/rules/proxy.yaml
    path: "./rules/proxy.yaml"
    interval: 3600
  direct:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/cccccoke/sub-store/main/rules/direct.yaml
    path: "./rules/direct.yaml"
    interval: 3600
rules:
- DOMAIN-SUFFIX,localhost,DIRECT
- DOMAIN-SUFFIX,localhost.localdomain,DIRECT
- DOMAIN-SUFFIX,local,DIRECT
- DOMAIN-SUFFIX,internal,DIRECT
- DOMAIN-SUFFIX,intranet,DIRECT
- DOMAIN-SUFFIX,corp,DIRECT
- DOMAIN-SUFFIX,private,DIRECT
- DOMAIN-SUFFIX,router.asus.com,DIRECT
- DOMAIN-SUFFIX,tplinkwifi.net,DIRECT
- DOMAIN-SUFFIX,tplogin.cn,DIRECT
- DOMAIN-SUFFIX,tendawifi.com,DIRECT
- DOMAIN-SUFFIX,miwifi.com,DIRECT
- DOMAIN-SUFFIX,router.ctc,DIRECT
- DOMAIN-SUFFIX,my.router,DIRECT
- DOMAIN-SUFFIX,fritz.box,DIRECT
- DOMAIN-SUFFIX,netgear.com,DIRECT
- DOMAIN-SUFFIX,routerlogin.net,DIRECT
- DOMAIN-SUFFIX,linksyssmartwifi.com,DIRECT
- DOMAIN,captive.apple.com,DIRECT
- DOMAIN-SUFFIX,synology.me,DIRECT
- DOMAIN-SUFFIX,myqnapcloud.com,DIRECT
- DOMAIN-SUFFIX,test,DIRECT
- DOMAIN-SUFFIX,example,DIRECT
- DOMAIN-SUFFIX,invalid,DIRECT
- DOMAIN-SUFFIX,localdomain,DIRECT
- GEOIP,PRIVATE,DIRECT,no-resolve
- DOMAIN,raw.githubusercontent.com,Developer Download
- RULE-SET,ai,AI Stable
- RULE-SET,developer-download,Developer Download
- RULE-SET,developer,Developer
- RULE-SET,research,Default Proxy
- RULE-SET,proxy,Default Proxy
- RULE-SET,direct,DIRECT
- GEOIP,CN,DIRECT,no-resolve
- MATCH,Default Proxy
